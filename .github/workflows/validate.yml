name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Verify script syntax
      run: |
        bash -n scripts/create-family
        bash -n scripts/skill-deploy
        bash -n scripts/validate-family
        bash -n scripts/rollback-deploy
        bash -n tests/smoke.sh
        python3 -m py_compile scripts/skill_tooling.py

    - name: Validate Python project metadata
      run: |
        python3 - <<'PY'
        import pathlib
        import tomllib

        pyproject = pathlib.Path("pyproject.toml")
        data = tomllib.loads(pyproject.read_text())
        project = data["project"]
        assert project["name"] == "skill-tooling"
        assert data["tool"]["poetry"]["package-mode"] is False
        assert pathlib.Path("poetry.lock").exists()
        PY

    - name: Check scripts are executable
      run: |
        test -x scripts/create-family || { echo "scripts/create-family not executable"; exit 1; }
        test -x scripts/skill-deploy || { echo "scripts/skill-deploy not executable"; exit 1; }
        test -x scripts/validate-family || { echo "scripts/validate-family not executable"; exit 1; }
        test -x scripts/rollback-deploy || { echo "scripts/rollback-deploy not executable"; exit 1; }
        test -x tests/smoke.sh || { echo "tests/smoke.sh not executable"; exit 1; }
        echo "Scripts are executable"

    - name: Reject tracked secret env files
      run: |
        if git ls-files | grep -E '(^|/)\.env($|\.|/)|(^|/)\.skill-tooling\.env($|\.|/)' >/dev/null; then
          echo "Tracked .env or .skill-tooling.env files are not allowed"
          git ls-files | grep -E '(^|/)\.env($|\.|/)|(^|/)\.skill-tooling\.env($|\.|/)'
          exit 1
        fi

    - name: Smoke test scaffold and deploy flow
      run: tests/smoke.sh
